# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "5.3"

package:
  name: django-sql-explorer
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-sql-explorer/django_sql_explorer-${{ version }}.tar.gz
  sha256: ce2da0e8c67eab0b22e0fa7dfc0caf189735029bdc83e33dceef009be787a08a

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django >=3.2
    - sqlparse >=0.4.0
    - requests >=2.2
    - django-cryptography-django5 ==2.2
    - cryptography >=42.0
  run_constraints:
    - matplotlib-base >=3.9
    - boto3 >=1.30.0
    - celery >=4.0
    - xlsxwriter >=1.3.6
    - openai >=1.6.1
    - python-dateutil >=2.9
    - pandas >=2.2

tests:
  - python:
      imports:
        - explorer
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A pluggable Django app that allows users (admins) to execute SQL, view, and export the results.
  license: MIT
  license_file:
    - LICENSE
    - explorer/ee/LICENSE
  homepage: https://www.sqlexplorer.io
  repository: https://github.com/chrisclark/django-sql-explorer
  documentation: https://django-sql-explorer.readthedocs.io/en/latest/
  description: |
    Django SQL Explorer is a pluggable Django app that allows users
    (typically admins) to execute SQL queries directly from the browser,
    view and download the results, share queries, and explore the data
    with an optional AI-assisted SQL editor.

extra:
  recipe-maintainers:
    - rxm7706
